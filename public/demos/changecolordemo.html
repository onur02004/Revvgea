<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Color Configurator</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#eee;
    text-align:center;
}

h1{
    margin-top:40px;
}

.car-viewer{
    position:relative;
    width:800px;
    max-width:90%;
    margin:40px auto;
}

/* base car image */
.car-viewer img{
    width:100%;
    display:block;
}

/* color layer */
#paintLayer{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#841210;

    /* this applies the mask */
    -webkit-mask-image: url("paint.png");
    -webkit-mask-size: contain;
    -webkit-mask-repeat: no-repeat;
    -webkit-mask-position: center;

    mask-image: url("paint.png");
    mask-size: contain;
    mask-repeat: no-repeat;
    mask-position: center;

    mix-blend-mode:multiply;
}

/* color buttons */
.controls{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:30px;
}

.swatch{
    width:60px;
    height:60px;
    border-radius:50%;
    border:4px solid white;
    box-shadow:0 4px 10px rgba(0,0,0,0.25);
    cursor:pointer;
    transition:transform .2s;
}

.swatch:hover{
    transform:scale(1.1);
}

</style>
</head>

<body>

<h1>Customize Your Alfa Romeo</h1>

<div class="car-viewer">

    <img src="base.png">

    <div id="paintLayer"></div>

</div>

<div class="controls">
    <div class="swatch" style="background:#841210" onclick="changeColor('#841210')"></div>
    <div class="swatch" style="background:#0d4671" onclick="changeColor('#0d4671')"></div>
    <div class="swatch" style="background:#63803a" onclick="changeColor('#63803a')"></div>
    <div class="swatch" style="background:#333333" onclick="changeColor('#333333')"></div>
</div>

<script>

function changeColor(color){
    document.getElementById("paintLayer").style.background = color;
}

</script>

</body>
</html>
