<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ARCADE DRIVE: PRO CIRCUIT • OPTIMIZED</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            margin: 0;
            overflow: hidden;
            background: #020210;
            font-family: 'Segoe UI', 'Avenir', system-ui, sans-serif;
            color: white;
        }
        canvas {
            display: block;
            filter: drop-shadow(0 0 8px rgba(0,255,255,0.3));
        }
        #hud {
            position: absolute;
            top: 24px;
            right: 28px;
            text-align: right;
            pointer-events: none;
            z-index: 20;
        }
        #speedText {
            font-size: 80px;
            font-weight: 900;
            color: #00ffe1;
            text-shadow: 0 0 25px #00ffe1, 0 0 50px #0066ff;
            line-height: 0.7;
            letter-spacing: 4px;
        }
        #hud small {
            font-size: 14px;
            color: #aaccff;
            letter-spacing: 6px;
            display: block;
            margin-top: -8px;
        }
        #menu {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(8, 12, 24, 0.85);
            backdrop-filter: blur(8px);
            padding: 24px 22px;
            border-radius: 28px;
            border: 1px solid rgba(0, 255, 213, 0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 30px rgba(0,255,200,0.2);
            z-index: 200;
            width: 260px;
        }
        .mode-btn {
            border: none;
            width: 100%;
            padding: 14px 0;
            border-radius: 60px;
            font-weight: 800;
            font-size: 16px;
            letter-spacing: 1.5px;
            cursor: pointer;
            margin-bottom: 16px;
            transition: 0.2s ease;
            text-transform: uppercase;
            box-shadow: 0 8px 0 rgba(0,0,0,0.5);
        }
        #startBtn {
            background: #ff1a6e;
            color: white;
            border-bottom: 3px solid #b0004a;
        }
        #startBtn:hover { background: #ff3a8e; transform: scale(1.02); }
        #escapeBtn {
            background: #1a6eff;
            color: white;
            border-bottom: 3px solid #003bb3;
        }
        #escapeBtn:hover { background: #3a8eff; transform: scale(1.02); }
        .map-section {
            margin-top: 24px;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 14px;
            font-size: 11px;
            color: #88aaff;
            letter-spacing: 2px;
        }
        .map-btn {
            background: #101520;
            color: #aab9e0;
            border: 1px solid #2a3a60;
            padding: 10px 8px;
            cursor: pointer;
            display: block;
            width: 100%;
            margin-bottom: 8px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            transition: 0.2s;
            text-transform: uppercase;
        }
        .map-btn.active {
            border-color: #00ffc3;
            color: #00ffc3;
            background: #0a2929;
            box-shadow: 0 0 20px #00ffc3;
        }
        #scoreHUD {
            position: absolute;
            left: 50%;
            top: 28px;
            transform: translateX(-50%);
            font-weight: 900;
            font-size: 52px;
            color: #fff35c;
            text-shadow: 0 0 20px #ffd966, 0 0 40px #ffaa33;
            letter-spacing: 4px;
            background: rgba(0,0,0,0.3);
            padding: 8px 28px;
            border-radius: 80px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,100,0.4);
            z-index: 15;
        }
        #nitroBar {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 240px;
            height: 18px;
            background: rgba(20,20,40,0.7);
            border-radius: 40px;
            overflow: hidden;
            backdrop-filter: blur(4px);
            border: 1px solid #33ffff;
            box-shadow: 0 0 20px cyan;
            z-index: 30;
        }
        #nitroFill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #88ffff, #00ffcc, #44ffff);
            box-shadow: 0 0 30px #00ffff;
            transition: width 0.1s ease;
        }
        #hint {
            position: absolute;
            bottom: 40px;
            right: 40px;
            color: #b0d0ff;
            font-size: 13px;
            background: rgba(8,12,30,0.6);
            padding: 8px 18px;
            border-radius: 40px;
            backdrop-filter: blur(3px);
            border: 1px solid cyan;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div id="menu">
        <button class="mode-btn" id="startBtn" onclick="toggleMode('pursuit')">🏁 PURSUE TARGET</button>
        <button class="mode-btn" id="escapeBtn" onclick="toggleMode('escape')">🚔 ESCAPE COPS</button>
        <div class="map-section">🌍 SELECT ENVIRONMENT</div>
        <button class="map-btn active" id="btn-downtown" onclick="setMap('downtown')">🌃 NEON DOWNTOWN</button>
        <button class="map-btn" id="btn-race" onclick="setMap('race')">🏞️ GENERATED RACEWAY</button>
        <button class="map-btn" id="btn-harbor" onclick="setMap('harbor')">⚓ CARGO HARBOR</button>
        <div style="font-size: 10px; color: #6688cc; margin-top: 18px; opacity:0.7;">WASD • SPACE = NITRO • SHIFT = DRIFT</div>
    </div>

    <div id="scoreHUD">🎯 <span id="scoreVal">0</span></div>
    <div id="hud">
        <div id="speedText">0</div>
        <small>KM/H</small>
    </div>
    <div id="nitroBar"><div id="nitroFill"></div></div>
    <div id="hint">⚡ SHIFT to powerslide • collect cubes</div>

    <canvas id="gameCanvas"></canvas>

<script>
(function() {
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // ---------- GLOBALS ----------
    let gameMode = 'none';          // 'pursuit', 'escape', 'none'
    let score = 0;
    let currentMap = 'downtown';
    let mapObjects = [];            // large buildings / blocks
    let streetObjects = [];         // collectibles & environment cubes
    let particles = [];
    let skidMarks = [];             // dynamic drifting trails
    let cops = [];
    let trackPath = [];             // for race map (spline)
    
    // camera effects
    let shake = 0;
    const zoom = 1.2;               // slightly zoomed out for better view

    const MAP_SIZE = 3000;           // world half-size
    const keys = {};

    // performance: limit arrays
    const MAX_PARTICLES = 400;
    const MAX_SKIDMARKS = 250;

    // ---------- CAR (PLAYER) ----------
    const car = {
        x: 0, y: 0, angle: 0,
        speed: 0, velX: 0, velY: 0,
        width: 22, height: 46,
        accel: 0.18,
        maxSpeed: 6.8,
        friction: 0.982,
        grip: 0.18,                 // normal grip
        driftGrip: 0.06,            // low grip when drifting (slide)
        rotationSpeed: 0.052,
        nitro: 100,
        drifting: false
    };

    // AI target car (pursuit mode)
    const ai = {
        x: 300, y: 300, angle: 0, speed: 0,
        velX: 0, velY: 0, width: 22, height: 46,
        accel: 0.13, maxSpeed: 5.6,
        friction: 0.982, grip: 0.16,
        active: false
    };

    // ---------- HELPERS ----------
    function resetPositions() {
        if (currentMap === 'race' && trackPath.length > 5) {
            car.x = trackPath[0].x;
            car.y = trackPath[0].y;
            // set angle along path
            let dx = trackPath[1].x - trackPath[0].x;
            let dy = trackPath[1].y - trackPath[0].y;
            car.angle = Math.atan2(dx, -dy);
        } else {
            car.x = 0; car.y = 0;
            car.angle = 0;
        }
        car.speed = 0; car.velX = 0; car.velY = 0;
        ai.x = car.x + 280; ai.y = car.y + 180;
        ai.angle = 0; ai.speed = 0;
        cops = [];
    }

    // ---------- SPAWN COPS (escape mode) ----------
    function spawnCops() {
        cops = [];
        for (let i = 0; i < 3; i++) {
            cops.push({
                x: car.x + 500 + i * 200, y: car.y + 400 + i * 50,
                angle: 0, speed: 0, velX: 0, velY: 0,
                width: 24, height: 48,
                accel: 0.11, maxSpeed: 5.9,
                friction: 0.98, grip: 0.14,
                sirenFrame: 0,
                color: '#2266ff'
            });
        }
    }

    // ---------- TOGGLE MODE ----------
    window.toggleMode = function(mode) {
        if (gameMode === mode) {
            gameMode = 'none';
            ai.active = false;
            cops = [];
        } else {
            gameMode = mode;
            score = 0;
            document.getElementById('scoreVal').innerText = '0';
            resetPositions();
            if (mode === 'pursuit') {
                ai.active = true;
                cops = [];
            } else { // escape
                ai.active = false;
                spawnCops();
            }
        }
    };

    // ---------- MAP GENERATION (enhanced) ----------
    function generateMap(type) {
        mapObjects = [];
        streetObjects = [];
        trackPath = [];

        if (type === 'race') {
            // high quality race track with catmull-rom spline
            const nodes = 14;
            const radius = 1400;
            let raw = [];
            for (let i = 0; i < nodes; i++) {
                let a = (i / nodes) * Math.PI * 2;
                let rVar = radius + (Math.random() * 800 - 400);
                raw.push({ x: Math.cos(a) * rVar, y: Math.sin(a) * rVar });
            }
            // smooth interpolation
            for (let i = 0; i < nodes; i++) {
                let p0 = raw[(i + nodes - 1) % nodes];
                let p1 = raw[i];
                let p2 = raw[(i + 1) % nodes];
                let p3 = raw[(i + 2) % nodes];
                for (let t = 0; t < 1; t += 0.05) {
                    let tt = t * t, ttt = tt * t;
                    let x = 0.5 * ((2 * p1.x) + (-p0.x + p2.x) * t + (2 * p0.x - 5 * p1.x + 4 * p2.x - p3.x) * tt + (-p0.x + 3 * p1.x - 3 * p2.x + p3.x) * ttt);
                    let y = 0.5 * ((2 * p1.y) + (-p0.y + p2.y) * t + (2 * p0.y - 5 * p1.y + 4 * p2.y - p3.y) * tt + (-p0.y + 3 * p1.y - 3 * p2.y + p3.y) * ttt);
                    trackPath.push({ x, y });
                }
            }
            // add collectibles along edges
            const trackWidth = 360;
            trackPath.forEach((p, idx) => {
                let next = trackPath[(idx + 1) % trackPath.length];
                let a = Math.atan2(next.y - p.y, next.x - p.x);
                let px = Math.cos(a + Math.PI/2);
                let py = Math.sin(a + Math.PI/2);
                if (idx % 3 === 0) {
                    streetObjects.push({ x: p.x + px * (trackWidth/2-20), y: p.y + py * (trackWidth/2-20), w: 18, h: 18, color: '#ffaa00', score: 100, destroyed: false });
                    streetObjects.push({ x: p.x - px * (trackWidth/2-20), y: p.y - py * (trackWidth/2-20), w: 18, h: 18, color: '#44ffaa', score: 100, destroyed: false });
                }
            });
        } else {
            // downtown / harbor grid with personality
            let hue = type === 'harbor' ? 210 : 280;
            for (let x = -MAP_SIZE; x <= MAP_SIZE; x += 550) {
                for (let y = -MAP_SIZE; y <= MAP_SIZE; y += 550) {
                    if (Math.hypot(x, y) < 700) continue; // central plaza
                    let color = `hsl(${hue + (x*0.02 + y*0.01) % 30}, 70%, 15%)`;
                    mapObjects.push({ x: x+40, y: y+30, w: 360, h: 360, color });
                    // collectibles scattered
                    if (Math.random() < 0.4) {
                        streetObjects.push({ x: x+200+Math.random()*200, y: y+200*Math.random(), w: 18, h: 18, color: '#ffcc00', score: 70, destroyed: false });
                    }
                }
            }
        }
        // add extra glowy cubes (always) – limited number
        for (let i=0; i<25; i++) {
            streetObjects.push({ 
                x: (Math.random()-0.5)*2800, y: (Math.random()-0.5)*2800,
                w: 15, h: 15, color: '#ff66aa', score: 150, destroyed: false 
            });
        }
    }

    window.setMap = function(m) {
        currentMap = m;
        generateMap(m);
        resetPositions();
        document.querySelectorAll('.map-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-'+m).classList.add('active');
    };

    // keyboard
    window.onkeydown = e => keys[e.code] = true;
    window.onkeyup = e => keys[e.code] = false;

    // ---------- DESTRUCTION / COLLECT ----------
    function handleCollect(v) {
        for (let obj of streetObjects) {
            if (!obj.destroyed && Math.hypot(v.x - obj.x, v.y - obj.y) < 35) {
                obj.destroyed = true;
                if (v === car) {
                    score += obj.score;
                    document.getElementById('scoreVal').innerText = score;
                    shake = 6;
                    // juicy particle burst (limited)
                    let count = Math.min(10, MAX_PARTICLES - particles.length);
                    for (let i = 0; i < count; i++) {
                        particles.push({
                            x: obj.x, y: obj.y,
                            vx: (Math.random() - 0.5) * 10,
                            vy: (Math.random() - 0.5) * 10,
                            life: 1.0,
                            color: obj.color,
                            size: 6
                        });
                    }
                }
            }
        }
    }

    // collision with buildings (simple)
    function buildingCollision(v) {
        for (let o of mapObjects) {
            if (v.x > o.x && v.x < o.x+o.w && v.y > o.y && v.y < o.y+o.h) {
                v.x -= v.velX * 1.2;
                v.y -= v.velY * 1.2;
                v.velX *= -0.4;
                v.velY *= -0.4;
                v.speed *= 0.5;
                shake = 12;
                break;
            }
        }
    }

    // ---------- AI UPDATE (pursuit / escape) ----------
    function updateAI(v, targetX, targetY, fleeing = false) {
        let targetAngle = Math.atan2(targetX - v.x, -(targetY - v.y));
        if (fleeing) targetAngle = Math.atan2(v.x - targetX, -(v.y - targetY));
        let diff = targetAngle - v.angle;
        while (diff < -Math.PI) diff += Math.PI * 2;
        while (diff > Math.PI) diff -= Math.PI * 2;
        v.angle += diff * 0.04;
        v.speed = Math.min(v.speed + v.accel, v.maxSpeed);
        v.velX += (Math.sin(v.angle) * v.speed - v.velX) * v.grip;
        v.velY += (-Math.cos(v.angle) * v.speed - v.velY) * v.grip;
        v.x += v.velX;
        v.y += v.velY;
        buildingCollision(v);
        handleCollect(v);
    }

    // ---------- UPDATE LOOP (core) ----------
    function update() {
        // nitro
        let nitroBoost = 0;
        if (keys['Space'] && car.nitro > 0) {
            car.nitro -= 1.2;
            nitroBoost = car.accel * 3.2;
            shake = 3;
        } else {
            car.nitro = Math.min(car.nitro + 0.25, 100);
        }

        // drifting detection (Shift)
        car.drifting = keys['ShiftLeft'];
        let currentGrip = car.drifting ? car.driftGrip : car.grip;
        if (car.drifting && Math.abs(car.speed) > 1.5 && skidMarks.length < MAX_SKIDMARKS) {
            // skidmarks (limit)
            skidMarks.push({ x: car.x, y: car.y, life: 0.9 });
        }

        // throttle
        if (keys['KeyW']) car.speed += car.accel + nitroBoost;
        if (keys['KeyS']) car.speed -= car.accel * 0.7;
        let rot = car.rotationSpeed;
        if (car.drifting) rot *= 1.6; // more rotation while drifting
        if (keys['KeyA']) car.angle -= rot * Math.min(1, Math.abs(car.speed) / 3.5);
        if (keys['KeyD']) car.angle += rot * Math.min(1, Math.abs(car.speed) / 3.5);

        car.speed = Math.min(Math.max(car.speed, -2.5), nitroBoost > 0 ? 9.5 : car.maxSpeed);

        // physics
        car.velX += (Math.sin(car.angle) * car.speed - car.velX) * currentGrip;
        car.velY += (-Math.cos(car.angle) * car.speed - car.velY) * currentGrip;

        car.x += car.velX;
        car.y += car.velY;
        car.speed *= car.friction;

        // collisions
        buildingCollision(car);
        handleCollect(car);

        // AI & cops
        if (ai.active) updateAI(ai, car.x, car.y, true); // flee from car
        for (let cop of cops) {
            updateAI(cop, car.x, car.y, false);
            cop.sirenFrame++;
            if (Math.hypot(car.x - cop.x, car.y - cop.y) < 48) {
                alert("🚨 BUSTED! 🚨");
                toggleMode('escape');
            }
        }

        if (ai.active && Math.hypot(car.x - ai.x, car.y - ai.y) < 48) {
            alert("🎯 TARGET ELIMINATED");
            toggleMode('pursuit');
        }

        // particles update & limit
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.05;
            p.life -= 0.015;
            if (p.life <= 0) {
                particles.splice(i, 1);
            }
        }

        // skidmarks update & limit
        for (let i = skidMarks.length - 1; i >= 0; i--) {
            skidMarks[i].life -= 0.02;
            if (skidMarks[i].life <= 0) skidMarks.splice(i, 1);
        }

        // hud
        document.getElementById('speedText').innerText = Math.floor(Math.abs(car.speed) * 38);
        document.getElementById('nitroFill').style.width = car.nitro + '%';

        draw();
        requestAnimationFrame(update); // single loop
    }

    // ---------- DRAW (enhanced) ----------
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.translate(canvas.width/2, canvas.height/2);
        ctx.scale(zoom, zoom);
        if (shake > 0.2) {
            ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
            shake *= 0.92;
        }
        ctx.translate(-car.x, -car.y);

        // dynamic ambient light / fog
        let gradient = ctx.createRadialGradient(car.x, car.y, 300, car.x, car.y, 2500);
        gradient.addColorStop(0, 'rgba(20,30,70,0)');
        gradient.addColorStop(1, '#030310');
        ctx.fillStyle = gradient;
        ctx.fillRect(car.x - 2000, car.y - 2000, 4000, 4000);

        // draw race track surface
        if (currentMap === 'race' && trackPath.length > 0) {
            ctx.beginPath();
            ctx.lineWidth = 400;
            ctx.strokeStyle = '#1a1a2a';
            ctx.moveTo(trackPath[0].x, trackPath[0].y);
            for (let p of trackPath) ctx.lineTo(p.x, p.y);
            ctx.closePath();
            ctx.stroke();
            ctx.lineWidth = 8;
            ctx.strokeStyle = '#4affb5';
            ctx.setLineDash([30, 50]);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // buildings
        for (let o of mapObjects) {
            ctx.fillStyle = o.color;
            ctx.shadowBlur = 40;
            ctx.shadowColor = '#aaccff';
            ctx.fillRect(o.x, o.y, o.w, o.h);
        }
        ctx.shadowBlur = 0;

        // collectibles + glowing (only non-destroyed)
        for (let o of streetObjects) {
            if (!o.destroyed) {
                ctx.shadowBlur = 30;
                ctx.shadowColor = o.color;
                ctx.fillStyle = o.color;
                ctx.fillRect(o.x - o.w/2, o.y - o.h/2, o.w, o.h);
            }
        }

        // skidmarks
        ctx.globalAlpha = 0.5;
        for (let s of skidMarks) {
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.arc(s.x, s.y, 10 * s.life, 0, 2*Math.PI);
            ctx.fill();
        }
        ctx.globalAlpha = 1.0;

        // particles
        for (let p of particles) {
            ctx.globalAlpha = p.life;
            ctx.shadowBlur = 25;
            ctx.shadowColor = p.color;
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x - 4, p.y - 4, 8, 8);
        }
        ctx.globalAlpha = 1;
        ctx.shadowBlur = 0;

        // AI target car
        if (ai.active) {
            ctx.save();
            ctx.translate(ai.x, ai.y);
            ctx.rotate(ai.angle);
            ctx.shadowBlur = 40;
            ctx.shadowColor = '#ff44aa';
            ctx.fillStyle = '#ff44aa';
            ctx.fillRect(-11, -23, 22, 46);
            ctx.restore();
        }

        // cops
        for (let cop of cops) {
            ctx.save();
            ctx.translate(cop.x, cop.y);
            ctx.rotate(cop.angle);
            ctx.shadowBlur = 50;
            ctx.shadowColor = '#2266ff';
            ctx.fillStyle = '#2266ff';
            ctx.fillRect(-12, -24, 24, 48);
            // siren
            ctx.fillStyle = cop.sirenFrame % 12 < 6 ? 'red' : 'white';
            ctx.fillRect(-12, -10, 24, 6);
            ctx.restore();
        }

        // player car (with boost glow)
        ctx.save();
        ctx.translate(car.x, car.y);
        ctx.rotate(car.angle);
        ctx.shadowBlur = 60;
        ctx.shadowColor = '#00ffff';
        ctx.fillStyle = '#66ffff';
        ctx.fillRect(-11, -23, 22, 46);
        // headlights
        ctx.fillStyle = 'white';
        ctx.shadowBlur = 40;
        ctx.shadowColor = 'white';
        ctx.fillRect(6, -24, 6, 8);
        ctx.fillRect(-12, -24, 6, 8);
        ctx.restore();

        ctx.restore(); // restore camera
    }

    // init
    setMap('downtown');
    update();

    // resize handler
    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });
})();
</script>
</body>
</html>
