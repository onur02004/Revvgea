<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Driving Licence Creator</title>
    <style>
        body {
            background: #131313;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .card {
            position: relative;
            width: 600px;
            height: 300px;
            background-image: url('licenceNotFilled.png');
            background-size: cover;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        #photo-slot {
            position: absolute;
            top: 90px;
            left: 24px;
            width: 140px;
            height: 181px;
            background: #333;
            object-fit: cover;
        }

        .data-field {
            position: absolute;
            font-weight: bold;
            color: #1a2a4d;
            /* Dark blue matching the template */
            font-size: 16px;
            text-transform: uppercase;
        }

        /* Specific Field Alignments */
        #out-racer {
            top: 96px;
            left: 350px;
        }

        #out-user {
            top: 126px;
            left: 350px;
        }

        #out-plate {
            top: 157px;
            left: 350px;
        }

        #out-car {
            top: 188px;
            left: 270px;
        }

        
        #out-id   { top: 219px; left: 350px; font-size: 11px; }


        /* Barcode Area */
        #barcode-container {
            position: absolute;
            bottom: 15px;
            left: 475px;
            background: white;
            padding: 2px;
            height: 45px;
            width: 480px;
            transform: translateX(-50%);
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            background: #222;
            padding: 20px;
            border-radius: 10px;
            width: 600px;
        }

        input {
            padding: 10px;
            border-radius: 5px;
            border: none;
        }

        #barcode-wrapper {
            position: absolute;
            bottom: 12px;
            right: 25px;
            /* Aligns with the right side of the card */
            width: 280px;
            height: 50px;
            display: flex;
            justify-content: right;
            align-items: center;
        }

        #barcode-img {
            max-width: 100%;
            max-height: 100%;
        }
    </style>
</head>

<body>

    <div class="card" id="licence-card">
        <img id="photo-slot" src="" alt="Driver Photo">
        <div id="out-racer" class="data-field"></div>
        <div id="out-user" class="data-field"></div>
        <div id="out-plate" class="data-field"></div>
        <div id="out-car" class="data-field"></div>
        <div id="out-id" class="data-field"></div>


        <div id="barcode-wrapper">
            <img id="barcode-img" src="" alt="Barcode">
        </div>
    </div>

    <div class="controls">
        <input type="text" id="in-racer" placeholder="Racer Name" oninput="updateRacer(this.value)">
        <input type="text" id="in-user" placeholder="User Name" oninput="updateUser(this.value)">
        <input type="text" id="in-plate" placeholder="Licence Plate" oninput="updatePlate(this.value)">
        <input type="text" id="in-car" placeholder="Favorite Car" oninput="updateCar(this.value)">
        <input type="text" id="in-id" placeholder="User Id" oninput="updateId(this.value)">
        <input type="text" id="in-barcode" placeholder="Barcode Numbers" oninput="updateCar(this.value)">
        <input type="file" id="in-file" accept="image/*">
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

    <script>
        // --- SEPARATE UPDATE FUNCTIONS ---

        function updateRacer(val) {
            document.getElementById('out-racer').textContent = val;
        }

        function updateUser(val) {
            document.getElementById('out-user').textContent = val;
        }

        function updatePlate(val) {
            document.getElementById('out-plate').textContent = val;
        }

        function updateCar(val) {
            document.getElementById('out-car').textContent = val;
        }

        function updateId(val) {
            document.getElementById('out-id').textContent = val;
        }

        function updateBarcode(val) {
            if (!val) val = "000000";
            // This uses a public API to generate the barcode image instantly
            const barcodeUrl = `https://bwipjs-api.metafloor.com/?bcid=code128&text=${encodeURIComponent(val)}&scale=2&rotate=N&includetext`;
            document.getElementById('barcode-img').src = barcodeUrl;
        }
        // --- PHOTO UPLOAD LOGIC ---
        document.getElementById('in-file').onchange = function (evt) {
            const [file] = evt.target.files;
            if (file) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    document.getElementById('photo-slot').src = e.target.result;
                }
                reader.readAsDataURL(file);
            }
        }

        // Initialize with some default values
        window.onload = () => {
            updateBarcode("1234567890");
        };
    </script>
</body>

</html>
