<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Arcade Drive: Impact & Explosion</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, sans-serif; color: white; user-select: none; }
        canvas { display: block; }

        #hud { position: absolute; top: 20px; right: 20px; text-align: right; pointer-events: none; }
        #speedText { font-size: 64px; font-weight: 900; color: #00ffcc; line-height: 0.8; }
        
        #menu { 
            position: absolute; top: 20px; left: 20px; 
            background: rgba(10, 10, 20, 0.9); padding: 20px; 
            border-radius: 12px; border: 1px solid #333; z-index: 100;
            width: 220px;
        }

        #startBtn {
            background: #ff0055; color: white; border: none; 
            padding: 15px; width: 100%; border-radius: 8px;
            font-weight: bold; cursor: pointer; font-size: 16px;
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.4);
            margin-bottom: 15px; transition: 0.2s;
        }

        .map-btn { 
            background: #111; color: #777; border: 1px solid #333; 
            padding: 8px; cursor: pointer; display: block; width: 100%; 
            margin-bottom: 5px; border-radius: 5px; font-size: 11px;
        }
        .map-btn.active { border-color: #00ffcc; color: #00ffcc; background: #0a1a1a; }

        #scoreHUD {
            position: absolute; left: 50%; top: 20px; transform: translateX(-50%);
            font-weight: bold; font-size: 42px; color: #ffff00;
            text-shadow: 0 0 20px rgba(255, 255, 0, 0.5);
        }

        #nitroBar {
            position: absolute; bottom: 30px; left: 30px; width: 200px; height: 8px;
            background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden;
        }
        #nitroFill { width: 100%; height: 100%; background: #00ffcc; box-shadow: 0 0 10px #00ffcc; }
    </style>
</head>
<body>

    <div id="menu">
        <button id="startBtn" onclick="toggleRace()">START RACE</button>
        <div style="font-size: 10px; color: #555; margin-bottom: 10px;">SELECT TRACK</div>
        <button class="map-btn active" id="btn-downtown" onclick="setMap('downtown')">NEON CITY</button>
        <button class="map-btn" id="btn-harbor" onclick="setMap('harbor')">CARGO COVE</button>
        <button class="map-btn" id="btn-junkyard" onclick="setMap('junkyard')">CYBER JUNKYARD</button>
        <div style="margin-top: 15px; font-size: 11px; color: #888;">
            <b>W/S</b> DRIVE | <b>SPACE</b> NITRO<br>
            <b>SHIFT</b> DRIFT | <b>A/D</b> STEER
        </div>
    </div>

    <div id="scoreHUD">SCORE: <span id="scoreVal">0</span></div>

    <div id="hud">
        <div id="speedText">0</div>
        <div style="font-size: 12px; color: #00ffcc; letter-spacing: 4px;">KM/H</div>
    </div>

    <div id="nitroBar"><div id="nitroFill"></div></div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let raceActive = false;
        let score = 0;
        let currentMap = 'downtown';
        let mapObjects = [];
        let streetObjects = [];
        let particles = [];
        let floatingTexts = [];
        let tireTracks = [];
        let shake = 0;
        let zoom = 1.3;
        const MAP_SIZE = 4000;
        const keys = {};

        const car = { 
            x: 0, y: 0, angle: 0, speed: 0, velX: 0, velY: 0, 
            width: 18, height: 38, accel: 0.12, maxSpeed: 4.8, 
            friction: 0.98, driftGrip: 0.15, rotationSpeed: 0.05, nitro: 100
        };

        const ai = {
            x: 250, y: 250, angle: 0, speed: 0, velX: 0, velY: 0,
            width: 18, height: 38, accel: 0.07, maxSpeed: 3.5, 
            friction: 0.98, driftGrip: 0.12, active: false
        };

        function generateMap(type) {
            mapObjects = []; streetObjects = [];
            for(let x = -MAP_SIZE; x < MAP_SIZE; x += 800) {
                for(let y = -MAP_SIZE; y < MAP_SIZE; y += 800) {
                    if (Math.abs(x) < 700 && Math.abs(y) < 700) continue; 
                    if(type === 'downtown') {
                        mapObjects.push({ x: x+100, y: y+100, w: 400, h: 400, color: '#0d0d15' });
                        for(let i=0; i<4; i++) streetObjects.push({ x: x+550, y: y+100+(i*100), w: 12, h: 12, type: 'cone', score: 50 });
                    } else if(type === 'harbor') {
                        mapObjects.push({ x: x+100, y: y+100, w: 200, h: 600, color: '#1a1a25' });
                        for(let i=0; i<2; i++) streetObjects.push({ x: x+400, y: y+200+(i*200), w: 40, h: 80, type: 'container', score: 500, color: '#224466' });
                    } else if(type === 'junkyard') {
                        mapObjects.push({ x: x+100, y: y+100, w: 300, h: 150, color: '#2a1a0a' }); 
                        streetObjects.push({ x: x+400, y: y+400, w: 15, h: 15, type: 'pole', score: 300 });
                    }
                }
            }
        }

        function setMap(m) {
            currentMap = m;
            document.querySelectorAll('.map-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + m).classList.add('active');
            generateMap(m);
            resetPositions();
        }

        function resetPositions() {
            car.x = 0; car.y = 0; car.speed = 0; car.velX = 0; car.velY = 0; car.angle = 0;
            ai.x = car.x + 250; ai.y = car.y + 250; 
            ai.speed = 0; ai.active = false;
        }

        function toggleRace() {
            raceActive = !raceActive;
            if(raceActive) { resetPositions(); ai.active = true; document.getElementById('startBtn').innerText = "STOP RACE"; } 
            else { ai.active = false; document.getElementById('startBtn').innerText = "START RACE"; score = 0; document.getElementById('scoreVal').innerText = "0"; setMap(currentMap); }
        }

        window.onkeydown = e => keys[e.code] = true;
        window.onkeyup = e => keys[e.code] = false;

        function addParticle(x, y, color, count = 10, life = 1.0, size = 4) {
            for(let i=0; i<count; i++) {
                particles.push({
                    x, y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10,
                    life: life, size: size + Math.random()*2, color
                });
            }
        }

        function spawnText(x, y, text) {
            floatingTexts.push({ x, y, text, life: 1.0, vy: -2 });
        }

        function handleDestruction(v) {
            streetObjects.forEach(obj => {
                if(!obj.destroyed && Math.hypot(v.x - (obj.x+obj.w/2), v.y - (obj.y+obj.h/2)) < 30) {
                    obj.destroyed = true;
                    v.speed *= 0.6;
                    shake = 10;
                    
                    let pCol = obj.type === 'cone' ? '#ff6600' : (obj.type === 'pole' ? '#00ffcc' : (obj.color || '#886644'));
                    addParticle(obj.x + obj.w/2, obj.y + obj.h/2, pCol, 20); // RESTORED EXPLOSION

                    if(v === car) {
                        let bonus = obj.score + Math.floor(Math.abs(v.speed) * 15);
                        score += bonus;
                        document.getElementById('scoreVal').innerText = score;
                        spawnText(obj.x, obj.y, "+" + bonus);
                    }
                }
            });
        }

        function update() {
            let isNitro = keys['Space'] && car.nitro > 0;
            let isDrifting = keys['ShiftLeft'] && Math.abs(car.speed) > 1;
            let curMax = car.maxSpeed * (isNitro ? 1.8 : 1);
            
            if(isNitro) { car.nitro -= 0.8; shake = Math.max(shake, 2); addParticle(car.x, car.y, '#00ffff', 1, 0.3, 2); } 
            else car.nitro = Math.min(car.nitro + 0.15, 100);

            if (keys['KeyW']) car.speed += car.accel;
            if (keys['KeyS']) car.speed -= car.accel;
            let rot = car.rotationSpeed * (isDrifting ? 2.5 : 1);
            if (keys['KeyA']) car.angle -= rot * (car.speed > 0 ? 1 : -1);
            if (keys['KeyD']) car.angle += rot * (car.speed > 0 ? 1 : -1);

            car.speed = Math.min(Math.max(car.speed, -curMax/2), curMax);
            let tx = Math.sin(car.angle) * car.speed;
            let ty = -Math.cos(car.angle) * car.speed;
            let grip = isDrifting ? car.driftGrip * 0.4 : car.driftGrip;
            car.velX += (tx - car.velX) * grip;
            car.velY += (ty - car.velY) * grip;
            car.speed *= car.friction;

            if(!checkCollision(car.x + car.velX, car.y + car.velY)) { car.x += car.velX; car.y += car.velY; } 
            else { car.speed *= -0.5; shake = 12; }

            if(isDrifting || Math.hypot(car.velX - tx, car.velY - ty) > 1.2) tireTracks.push({x: car.x, y: car.y, angle: car.angle, life: 1.0});

            if(ai.active) {
                let targetAngle = Math.atan2(ai.x - car.x, -(ai.y - car.y));
                let diff = targetAngle - ai.angle;
                while (diff < -Math.PI) diff += Math.PI * 2;
                while (diff > Math.PI) diff -= Math.PI * 2;
                ai.angle += diff * 0.04;
                ai.speed = Math.min(ai.speed + ai.accel, ai.maxSpeed);
                ai.velX += (Math.sin(ai.angle)*ai.speed - ai.velX) * ai.driftGrip;
                ai.velY += (-Math.cos(ai.angle)*ai.speed - ai.velY) * ai.driftGrip;
                ai.x += ai.velX; ai.y += ai.velY;
                handleDestruction(ai);
            }

            handleDestruction(car);
            particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life -= 0.03; });
            particles = particles.filter(p => p.life > 0);
            tireTracks.forEach(t => t.life -= 0.005);
            tireTracks = tireTracks.filter(t => t.life > 0);
            floatingTexts.forEach(f => { f.y += f.vy; f.life -= 0.02; });
            floatingTexts = floatingTexts.filter(f => f.life > 0);

            if(raceActive && Math.hypot(car.x - ai.x, car.y - ai.y) < 50) { alert("CAUGHT! SCORE: " + score); toggleRace(); }
            document.getElementById('speedText').innerText = Math.floor(Math.abs(car.speed) * 40);
            document.getElementById('nitroFill').style.width = car.nitro + '%';
            draw(isNitro);
            requestAnimationFrame(update);
        }

        function checkCollision(nx, ny) { return mapObjects.some(o => nx + 10 > o.x && nx - 10 < o.x + o.w && ny + 10 > o.y && ny - 10 < o.y + o.h); }

        function draw(isNitro) {
            ctx.fillStyle = "#020205"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(canvas.width/2, canvas.height/2);
            zoom += ((isNitro ? 1.0 : 1.3) - zoom) * 0.1;
            ctx.scale(zoom, zoom);
            if(shake > 0.1) { ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake); shake *= 0.9; }
            ctx.translate(-car.x, -car.y);

            tireTracks.forEach(t => { ctx.globalAlpha = t.life * 0.4; ctx.fillStyle = "#111"; ctx.save(); ctx.translate(t.x, t.y); ctx.rotate(t.angle); ctx.fillRect(-9, -2, 18, 4); ctx.restore(); });
            ctx.globalAlpha = 1;

            mapObjects.forEach(o => { ctx.fillStyle = o.color; ctx.fillRect(o.x, o.y, o.w, o.h); });
            streetObjects.forEach(o => { if(!o.destroyed) { ctx.fillStyle = o.type === 'cone' ? '#ff6600' : '#00ffcc'; ctx.fillRect(o.x, o.y, o.w, o.h); } });
            particles.forEach(p => { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); });
            floatingTexts.forEach(f => { ctx.globalAlpha = f.life; ctx.fillStyle = "yellow"; ctx.font = "bold 20px Arial"; ctx.fillText(f.text, f.x, f.y); });
            ctx.globalAlpha = 1;

            if(ai.active) { ctx.save(); ctx.translate(ai.x, ai.y); ctx.rotate(ai.angle); ctx.fillStyle = "#ff00ff"; ctx.shadowBlur = 15; ctx.shadowColor = "#ff00ff"; ctx.fillRect(-9, -19, 18, 38); ctx.restore(); }

            ctx.save(); ctx.translate(car.x, car.y); ctx.rotate(car.angle);
            // Headlights
            let grd = ctx.createLinearGradient(0, -20, 0, -150); grd.addColorStop(0, "rgba(0, 255, 204, 0.4)"); grd.addColorStop(1, "rgba(0, 255, 204, 0)");
            ctx.fillStyle = grd; ctx.beginPath(); ctx.moveTo(-6, -18); ctx.lineTo(-25, -150); ctx.lineTo(10, -150); ctx.closePath(); ctx.fill();
            ctx.beginPath(); ctx.moveTo(6, -18); ctx.lineTo(25, -150); ctx.lineTo(-10, -150); ctx.closePath(); ctx.fill();
            // Body
            ctx.fillStyle = "#00ffcc"; ctx.shadowBlur = 15; ctx.shadowColor = "#00ffcc"; ctx.fillRect(-9, -19, 18, 38);
            ctx.restore();
            ctx.restore();

            if(ai.active) {
                let angle = Math.atan2(ai.y - car.y, ai.x - car.x);
                ctx.save(); ctx.translate(canvas.width/2, canvas.height/2); ctx.rotate(angle); ctx.translate(150, 0); ctx.fillStyle = "#ff00ff"; ctx.beginPath(); ctx.moveTo(20, 0); ctx.lineTo(-10, -10); ctx.lineTo(-10, 10); ctx.fill(); ctx.restore();
            }
            if(isNitro) { ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.lineWidth = 2; for(let i=0; i<15; i++) { let a = Math.random() * Math.PI * 2; ctx.beginPath(); ctx.moveTo(canvas.width/2 + Math.cos(a)*200, canvas.height/2 + Math.sin(a)*200); ctx.lineTo(canvas.width/2 + Math.cos(a)*500, canvas.height/2 + Math.sin(a)*500); ctx.stroke(); } }
        }

        setMap('downtown');
        update();
    </script>
</body>
</html>
